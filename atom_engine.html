<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body, html, #main { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #121212; overflow: hidden; }
        #summary-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 999;
            padding: 10px 18px;
            background: linear-gradient(135deg, #FF416C, #FF4B2B);
            color: white;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            cursor: pointer;
            border: none;
        }
        #error-tips { color: #888; text-align: center; position: absolute; top: 45%; left: 0; width: 100%; font-size: 14px; font-family: sans-serif; z-index: 10; }
    </style>
</head>
<body>
<button id="summary-btn" onclick="startSummary()">✨ 智记总结</button>
<div id="error-tips">启动中...</div>
<div id="main"></div>

<script>
    var myChart;

    function startSummary() {
        if (window.AndroidBridge && window.AndroidBridge.startAiReview) {
            window.AndroidBridge.startAiReview();
        }
    }

    function initChart() {
        if (myChart) return;
        var chartDom = document.getElementById('main');
        myChart = echarts.init(chartDom);
        myChart.on('click', function (params) {
            if (params.dataType === 'node' && params.data.category === 1) {
                if (window.AndroidBridge && window.AndroidBridge.openCategoryList) {
                    window.AndroidBridge.openCategoryList(params.data.name);
                }
            }
        });
    }

    // 核心渲染函数
    function renderGraph(rawData) {
        try {
            var dataObj = (typeof rawData === 'string') ? JSON.parse(rawData) : rawData;

            if (!myChart) initChart();
            document.getElementById('error-tips').style.display = 'none';

            var processedNodes = dataObj.nodes.map(function(node) {
                var isRoot = (node.category === 0);
                return {
                    name: node.name,
                    category: node.category,
                    symbolSize: node.value || 40,
                    draggable: true,
                    itemStyle: {
                        color: isRoot ? '#FF416C' : '#00B4DB',
                        shadowBlur: 20,
                        shadowColor: isRoot ? 'rgba(255, 65, 108, 0.8)' : 'rgba(0, 180, 219, 0.8)'
                    },
                    label: {
                        show: true,
                        position: 'inside',
                        color: '#fff',
                        fontSize: isRoot ? 14 : 11,
                        fontWeight: isRoot ? 'bold' : 'normal'
                    }
                };
            });

            myChart.setOption({
                backgroundColor: '#121212',
                animationDurationUpdate: 1500,
                series: [{
                    type: 'graph',
                    layout: 'force',
                    data: processedNodes,
                    links: dataObj.links,
                    roam: true,
                    scaleLimit: { min: 0.4, max: 3 }, // 限制缩放，解决挤在一起分不开
                    force: {
                        repulsion: 1200,      // 增大斥力
                        edgeLength: [100, 150],
                        gravity: 0.05,        // 减小引力
                        layoutAnimation: true
                    },
                    lineStyle: { color: 'rgba(255, 255, 255, 0.2)', width: 2, curveness: 0.2 },
                    emphasis: { focus: 'adjacency', lineStyle: { width: 5 } }
                }]
            });
        } catch (e) {
            document.getElementById('error-tips').innerText = "渲染失败: " + e.message;
        }
    }
</script>
</body>
</html>
